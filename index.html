<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="container">

  <!-- TOP STATS -->
  <div class="stats">
    <div class="card">
      <h4>Net P&L</h4>
      <h2>$126,900.81</h2>
    </div>

    <div class="card">
      <h4>Win Rate</h4>
      <h2>46.56%</h2>
    </div>

    <div class="card">
      <h4>Profit Factor</h4>
      <h2>1.70</h2>
    </div>

    <div class="card">
      <h4>Day Win %</h4>
      <h2>72%</h2>
    </div>

    <div class="card">
      <h4>Avg Win/Loss</h4>
      <h2>1.96</h2>
    </div>
  </div>

  <!-- MIDDLE -->
  <div class="middle">

    <!-- RADAR -->
    <div class="box">
      <h3>Zella Score</h3>
      <canvas id="radar"></canvas>
    </div>

    <!-- EQUITY -->
    <div class="box large">
      <h3>Equity Curve</h3>
      <canvas id="equity"></canvas>
    </div>

    <!-- DAILY PNL -->
    <div class="box">
      <h3>Daily P&L</h3>
      <canvas id="pnl"></canvas>
    </div>

  </div>

  <!-- BOTTOM -->
  <div class="bottom">

    <!-- RECENT TRADES -->
    <div class="box table-box">
      <h3>Recent Trades</h3>
      <table>
        <tr><th>Date</th><th>Pair</th><th>P&L</th></tr>
        <tr><td>03/27</td><td>MNQ</td><td class="red">-140</td></tr>
        <tr><td>03/27</td><td>MNQ</td><td class="green">+1152</td></tr>
      </table>
    </div>

    <!-- CALENDAR -->
    <div class="box calendar">
      <h3>Monthly Performance</h3>
      <div class="grid">
        <div class="day green">+9K</div>
        <div class="day red">-6K</div>
        <div class="day green">+8K</div>
        <div class="day red">-3K</div>
        <div class="day green">+7K</div>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
